<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BancoEstado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <h1 class="mb-4">BancoEstado - Gestión de Clientes</h1>

    <div class="d-flex gap-2 mb-4">
        <button class="btn btn-primary" onclick="cargarClientes()">Listar todos los clientes</button>
        <button class="btn btn-outline-primary" onclick="cargarConRut()">Clientes con cuenta RUT</button>
    </div>

    <div id="resultado" class="mb-4"></div>

    <div class="row g-4">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h5>Agregar cliente + Cuenta RUT</h5>
                    <input id="rut" class="form-control mb-2" placeholder="RUT">
                    <input id="nombre" class="form-control mb-2" placeholder="Nombre">
                    <input id="edad" class="form-control mb-2" placeholder="Edad">
                    <input id="telefono" class="form-control mb-2" placeholder="Teléfono">
                    <input id="email" class="form-control mb-2" placeholder="Email">
                    <button class="btn btn-success w-100" onclick="crearCliente('cuenta rut')">Agregar con Cuenta RUT</button>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h5>Agregar cliente + Cuenta AHORRO</h5>
                    <input id="rut2" class="form-control mb-2" placeholder="RUT">
                    <input id="nombre2" class="form-control mb-2" placeholder="Nombre">
                    <input id="edad2" class="form-control mb-2" placeholder="Edad">
                    <input id="telefono2" class="form-control mb-2" placeholder="Teléfono">
                    <input id="email2" class="form-control mb-2" placeholder="Email">
                    <button class="btn btn-success w-100" onclick="crearCliente('cuenta ahorro', '2')">Agregar con Cuenta AHORRO</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
async function cargarClientes() {
    const res = await fetch('/customers')
    const data = await res.json()
    mostrarClientes(data)
}

async function cargarConRut() {
    const res = await fetch('/customers/con-rut')
    const data = await res.json()
    mostrarClientes(data)
}

function mostrarClientes(clientes) {
    const div = document.getElementById('resultado')
    if (!clientes.length) { div.innerHTML = '<div class="alert alert-warning">No hay clientes.</div>'; return }
    div.innerHTML = `<table class="table table-striped">
        <thead class="table-dark"><tr><th>Nombre</th><th>RUT</th><th>Email</th><th>Cuentas</th><th>Acciones</th></tr></thead>
        <tbody>${clientes.map(c => `
            <tr>
                <td>${c.name}</td>
                <td>${c.rut}</td>
                <td>${c.email}</td>
                <td>${c.accounts.map(a => `<span class="badge bg-secondary me-1">${a.type}</span>`).join('')}</td>
                <td><button class="btn btn-danger btn-sm" onclick="eliminarCliente('${c.id_customer}')">Eliminar</button></td>
            </tr>`).join('')}
        </tbody>
    </table>`
}

async function crearCliente(accountType, suffix = '') {
    const body = {
        rut: document.getElementById('rut' + suffix).value,
        name: document.getElementById('nombre' + suffix).value,
        age: document.getElementById('edad' + suffix).value,
        phoneNumber: document.getElementById('telefono' + suffix).value,
        email: document.getElementById('email' + suffix).value,
        accountType
    }
    await fetch('/customers', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
    cargarClientes()
}

async function eliminarCliente(id) {
    await fetch(`/customers/${id}`, { method: 'DELETE' })
    cargarClientes()
}
</script>
</body>
</html>
